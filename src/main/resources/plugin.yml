name: OpenPhysicsControl
version: '${version}'
main: dev.openphysicscontrol.OpenPhysicsControlPlugin
description: 'Open source per-world physics controls for Bukkit servers'
api-version: '1.13'
folia-supported: true
authors: [OpenPhysicsControl contributors]
commands:
  openphysics:
    aliases: [ophysics, opc, pc]
    description: 'Manage world physics rules'
    usage: '/<command> [set|language|reload]'
permissions:
  openphysicscontrol.menu:
    default: op
  openphysicscontrol.set:
    default: op
  openphysicscontrol.reload:
    default: op
